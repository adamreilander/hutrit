<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=540">
<title>Fullstack Developer — Hutrit Club</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 540px;
    height: 960px;
    overflow: hidden;
    background: #f0f0ee;
  }

  .card {
    width: 540px;
    height: 960px;
    background: #f5f5f3;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 38px 36px 36px 36px;
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    overflow: hidden;
  }

  /* Subtle background pattern */
  .bg-pattern {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #b8cfc840 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* HEADER ROW */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo-badge {
    background: #003C2F;
    border-radius: 100px;
    padding: 9px 18px;
    display: inline-flex;
    align-items: center;
  }

  .logo-badge .hutrit {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
  }

  .logo-badge .club {
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    font-style: italic;
  }

  .hiring-label {
    color: #17A85B;
    font-size: 20px;
    font-weight: 800;
    text-align: right;
    line-height: 1.15;
    letter-spacing: -0.3px;
  }

  /* JOB TITLE */
  .job-title {
    color: #003C2F;
    font-size: 76px;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -2.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* SKILLS GRID */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }

  .skill-pill {
    border: 2.5px solid #003C2F;
    border-radius: 100px;
    padding: 13px 10px;
    text-align: center;
    color: #003C2F;
    font-size: 15px;
    font-weight: 800;
    background: #fff;
    letter-spacing: -0.2px;
  }

  /* INFO BOX */
  .info-box {
    border: 1.5px solid #cdd8d4;
    border-radius: 16px;
    padding: 22px 24px;
    background: #fff;
    box-shadow: 0 3px 16px rgba(0,60,47,0.07);
    margin-bottom: 22px;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .info-row:last-child { margin-bottom: 0; }

  .info-icon {
    font-size: 17px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .info-text {
    font-size: 15px;
    color: #333;
    font-weight: 500;
    line-height: 1.3;
  }

  .info-text strong {
    color: #17A85B;
    font-weight: 800;
  }

  .info-text .bold {
    font-weight: 700;
    color: #111;
  }

  /* CTA */
  .cta-btn {
    background: #17A85B;
    border-radius: 100px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }

  .cta-text {
    color: #fff;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .cta-circle {
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .cta-circle svg {
    width: 20px;
    height: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-pattern"></div>
  <div class="content">

    <div class="header">
      <div class="logo-badge">
        <span class="hutrit">Hutrit</span><span class="club">Club</span>
      </div>
      <div class="hiring-label">ESTAMOS<br>CONTRATANDO</div>
    </div>

    <div class="job-title">FULL&shy;STACK<br>DEVEL&shy;OPER</div>

    <div class="skills-grid">
      <div class="skill-pill">.NET / .NET Core</div>
      <div class="skill-pill">C#</div>
      <div class="skill-pill">Angular</div>
      <div class="skill-pill">SQL</div>
    </div>

    <div class="info-box">
      <div class="info-row">
        <span class="info-icon">💰</span>
        <span class="info-text">Salario inicial: <strong>$700 - $1.000 USD</strong></span>
      </div>
      <div class="info-row">
        <span class="info-icon">📍</span>
        <span class="info-text">Modalidad: <span class="bold">remoto - desde LATAM</span></span>
      </div>
      <div class="info-row">
        <span class="info-icon">🕐</span>
        <span class="info-text">Experiencia requerida: <span class="bold">3 a 5 Años</span></span>
      </div>
    </div>

    <div class="cta-btn">
      <span class="cta-text">REGÍSTRATE CON TU CV</span>
      <div class="cta-circle">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4v16M6 14l6 6 6-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

  </div>
</div>
</body>
</html>
